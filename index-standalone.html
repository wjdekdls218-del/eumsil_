<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />
  <title>실마리 — 뜨개 재료 중고거래</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1c1c1c; }
    #root { height: 100%; }
    .hide-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    button { -webkit-tap-highlight-color: transparent; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React

    // ─── 색상 토큰
    const C = {
      bg:        '#F5F0E8',
      point:     '#3DBDB8',
      text:      '#0C0C0C',
      white:     '#FFFFFF',
      gray:      '#9E9E9E',
      border:    '#DDD5CB',
    }

    // ─── 더미 데이터
    const SHARE_ITEMS = [
      { id: 1, title: '메리노울 실 100g 핑크',  region: '마포구',   image: 'https://picsum.photos/seed/knit11/300/300' },
      { id: 2, title: '코바늘 세트 5종',        region: '서초구',   image: 'https://picsum.photos/seed/knit22/300/300' },
      { id: 3, title: '아이보리 면사 200g',     region: '강남구',   image: 'https://picsum.photos/seed/knit33/300/300' },
      { id: 4, title: '뜨개 도안 모음집',       region: '종로구',   image: 'https://picsum.photos/seed/knit44/300/300' },
      { id: 5, title: '모헤어 혼방 흰색 실',    region: '용산구',   image: 'https://picsum.photos/seed/knit55/300/300' },
    ]

    const LATEST_ITEMS = [
      { id: 10, title: '알파카 혼방 실 베이지',    type: 'sell',  price: 8000,  region: '성동구',   status: '판매중', image: 'https://picsum.photos/seed/knit10/300/300' },
      { id: 11, title: '대바늘 7mm 2쌍 거의 새것', type: 'share', price: 0,     region: '마포구',   status: '나눔',   image: 'https://picsum.photos/seed/knit66/300/300' },
      { id: 12, title: '코바늘 5/0호 미개봉',      type: 'sell',  price: 3500,  region: '강서구',   status: '예약중', image: 'https://picsum.photos/seed/knit77/300/300' },
      { id: 13, title: '손뜨개 가방 키트 세트',    type: 'sell',  price: 15000, region: '은평구',   status: '판매중', image: 'https://picsum.photos/seed/knit88/300/300' },
      { id: 14, title: '연두 울실 50g',            type: 'share', price: 0,     region: '서대문구', status: '나눔',   image: 'https://picsum.photos/seed/knit99/300/300' },
      { id: 15, title: '터키쉬 코튼 블루 100g',    type: 'sell',  price: 6500,  region: '노원구',   status: '판매중', image: 'https://picsum.photos/seed/knit100/300/300' },
    ]

    const FAQ_ITEMS = [
      { id: 1, title: '울 실과 아크릴 실 차이가 뭔가요?',         answerCount: 12 },
      { id: 2, title: '코바늘 입문자에게 추천하는 실 굵기는요?',  answerCount: 8  },
    ]

    // ─── SVG 아이콘
    const SearchIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
    )
    const HomeIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24"
        fill={C.point} stroke={C.point}
        strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    )
    const ChatIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke={C.gray} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
    )
    const PlusIcon = () => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke="white" strokeWidth="2.5" strokeLinecap="round">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    )
    const GridIcon = () => (
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
        stroke={C.gray} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" />
      </svg>
    )
    const UserIcon = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke={C.gray} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
    )
    const BubbleIcon = () => (
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
    )
    const LocationIcon = () => (
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
        <circle cx="12" cy="10" r="3" />
      </svg>
    )
    const BellIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke={C.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.73 21a2 2 0 01-3.46 0" />
      </svg>
    )

    // ─── SearchBar
    function SearchBar() {
      return (
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          background: C.white, borderRadius: 999,
          padding: '11px 16px',
          boxShadow: '0 2px 8px rgba(0,0,0,0.07)',
        }}>
          <span style={{ color: C.gray, display: 'flex', flexShrink: 0 }}><SearchIcon /></span>
          <input
            type="search"
            placeholder="뜨개 재료를 검색해보세요"
            style={{
              border: 'none', outline: 'none', background: 'transparent',
              fontSize: 14, color: C.text, width: '100%',
              fontFamily: 'inherit',
            }}
          />
        </div>
      )
    }

    // ─── FilterTabs
    function FilterTabs({ filter, onChange }) {
      const tabs = [
        { key: 'all',   label: '전체' },
        { key: 'share', label: '나눔' },
        { key: 'sell',  label: '판매' },
      ]
      return (
        <div style={{ display: 'flex', gap: 8 }}>
          {tabs.map(tab => {
            const active = filter === tab.key
            return (
              <button key={tab.key} onClick={() => onChange(tab.key)} style={{
                borderRadius: 999,
                padding: '7px 20px',
                fontSize: 13, fontWeight: active ? 700 : 400,
                border: active ? 'none' : `1.5px solid ${C.border}`,
                background: active ? C.point : C.white,
                color: active ? C.white : C.text,
                cursor: 'pointer',
                transition: 'all 0.15s ease',
                fontFamily: 'inherit',
                letterSpacing: '-0.01em',
              }}>
                {tab.label}
              </button>
            )
          })}
        </div>
      )
    }

    // ─── ShareCard
    function ShareCard({ item }) {
      const [pressed, setPressed] = useState(false)
      return (
        <div
          onClick={() => console.log(`상품 ${item.id} 클릭`)}
          onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
          onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
          style={{
            flexShrink: 0, width: 148,
            background: C.white, borderRadius: 16,
            overflow: 'hidden', cursor: 'pointer',
            boxShadow: '0 2px 10px rgba(0,0,0,0.07)',
            transform: pressed ? 'scale(0.97)' : 'scale(1)',
            transition: 'transform 0.12s ease',
          }}
        >
          <div style={{ position: 'relative' }}>
            <img src={item.image} alt={item.title}
              style={{ width: '100%', height: 136, objectFit: 'cover', display: 'block' }} />
            <span style={{
              position: 'absolute', top: 8, left: 8,
              background: C.point, color: C.white,
              fontSize: 10, fontWeight: 700,
              borderRadius: 999, padding: '3px 8px',
            }}>나눔</span>
          </div>
          <div style={{ padding: '10px 12px 14px' }}>
            <p style={{
              margin: 0, fontSize: 13, fontWeight: 600, color: C.text,
              lineHeight: 1.45, letterSpacing: '-0.01em',
              overflow: 'hidden', display: '-webkit-box',
              WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
            }}>
              {item.title}
            </p>
            <p style={{ margin: '5px 0 0', fontSize: 11, color: C.gray, display: 'flex', alignItems: 'center', gap: 3 }}>
              <LocationIcon />{item.region}
            </p>
          </div>
        </div>
      )
    }

    // ─── ShareSection
    function ShareSection({ items }) {
      if (!items.length) return null
      return (
        <section>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, padding: '0 16px' }}>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: C.text, letterSpacing: '-0.02em' }}>
              🧶 지금 나눔 중이에요
            </h2>
            <span style={{ fontSize: 12, color: C.gray, cursor: 'pointer' }}>더보기</span>
          </div>
          <div className="hide-scrollbar" style={{ display: 'flex', gap: 12, overflowX: 'auto', padding: '4px 16px 8px' }}>
            {items.map(item => <ShareCard key={item.id} item={item} />)}
          </div>
        </section>
      )
    }

    // ─── StatusBadge
    function StatusBadge({ status }) {
      const map = {
        '나눔':   { bg: C.point,   color: C.white },
        '판매중': { bg: C.text,    color: C.white },
        '예약중': { bg: '#9E9E9E', color: C.white },
      }
      const s = map[status] || map['판매중']
      return (
        <span style={{
          display: 'inline-block', padding: '3px 10px', borderRadius: 999,
          fontSize: 11, fontWeight: 700, background: s.bg, color: s.color,
          whiteSpace: 'nowrap', letterSpacing: '-0.01em',
        }}>
          {status}
        </span>
      )
    }

    // ─── LatestCard
    function LatestCard({ item }) {
      const [pressed, setPressed] = useState(false)
      return (
        <div
          onClick={() => console.log(`상품 ${item.id} 클릭`)}
          onMouseDown={() => setPressed(true)} onMouseUp={() => setPressed(false)}
          onTouchStart={() => setPressed(true)} onTouchEnd={() => setPressed(false)}
          style={{
            display: 'flex', gap: 14,
            background: C.white, borderRadius: 16,
            padding: '14px', cursor: 'pointer',
            boxShadow: '0 2px 8px rgba(0,0,0,0.05)',
            alignItems: 'center',
            transform: pressed ? 'scale(0.98)' : 'scale(1)',
            transition: 'transform 0.12s ease',
          }}
        >
          <img src={item.image} alt={item.title}
            style={{ width: 80, height: 80, borderRadius: 12, objectFit: 'cover', flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <p style={{
              margin: '0 0 5px', fontSize: 14, fontWeight: 600, color: C.text,
              overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
              letterSpacing: '-0.01em',
            }}>
              {item.title}
            </p>
            <p style={{
              margin: '0 0 5px', fontSize: 14, fontWeight: 700,
              color: item.type === 'share' ? C.point : C.text,
              letterSpacing: '-0.01em',
            }}>
              {item.type === 'share' ? '나눔' : `${item.price.toLocaleString()}원`}
            </p>
            <p style={{ margin: 0, fontSize: 12, color: C.gray, display: 'flex', alignItems: 'center', gap: 3 }}>
              <LocationIcon />{item.region}
            </p>
          </div>
          <div style={{ flexShrink: 0 }}>
            <StatusBadge status={item.status} />
          </div>
        </div>
      )
    }

    // ─── LatestSection
    function LatestSection({ items }) {
      return (
        <section style={{ padding: '0 16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: C.text, letterSpacing: '-0.02em' }}>
              최신 등록
            </h2>
            <span style={{ fontSize: 12, color: C.gray, cursor: 'pointer' }}>더보기</span>
          </div>
          {items.length === 0 ? (
            <div style={{ padding: '40px 0', textAlign: 'center', color: C.gray, fontSize: 14, background: C.white, borderRadius: 16 }}>
              해당 카테고리 상품이 없어요
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {items.map(item => <LatestCard key={item.id} item={item} />)}
            </div>
          )}
        </section>
      )
    }

    // ─── FAQSection
    function FAQSection({ items }) {
      return (
        <section style={{ padding: '0 16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <h2 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: C.text, letterSpacing: '-0.02em' }}>
              💬 이런 질문 많아요
            </h2>
            <span style={{ fontSize: 12, color: C.gray, cursor: 'pointer' }}>더보기</span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {items.map(item => (
              <div key={item.id} style={{
                background: C.white, borderRadius: 16,
                padding: '16px', cursor: 'pointer',
                boxShadow: '0 2px 8px rgba(0,0,0,0.05)',
                display: 'flex', justifyContent: 'space-between',
                alignItems: 'center', gap: 14,
              }}>
                <p style={{ margin: 0, fontSize: 14, fontWeight: 500, color: C.text, flex: 1, lineHeight: 1.5, letterSpacing: '-0.01em' }}>
                  {item.title}
                </p>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4, flexShrink: 0, color: C.point }}>
                  <BubbleIcon />
                  <span style={{ fontSize: 12, fontWeight: 700 }}>{item.answerCount}</span>
                </div>
              </div>
            ))}
          </div>
        </section>
      )
    }

    // ─── BottomNav
    function BottomNav() {
      return (
        <nav style={{
          position: 'fixed', bottom: 0,
          left: '50%', transform: 'translateX(-50%)',
          width: '100%', maxWidth: 390,
          background: C.white,
          borderTop: `1px solid ${C.border}`,
          display: 'flex', justifyContent: 'space-around', alignItems: 'center',
          padding: '10px 4px 14px',
          zIndex: 100,
        }}>
          {/* 홈 */}
          <button style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, border: 'none', background: 'transparent', cursor: 'pointer', padding: '4px 10px', fontFamily: 'inherit' }}>
            <HomeIcon />
            <span style={{ fontSize: 10, color: C.point, fontWeight: 700 }}>홈</span>
          </button>
          {/* 채팅 */}
          <button style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, border: 'none', background: 'transparent', cursor: 'pointer', padding: '4px 10px', fontFamily: 'inherit' }}>
            <ChatIcon />
            <span style={{ fontSize: 10, color: C.gray }}>채팅</span>
          </button>
          {/* 글쓰기 (FAB) */}
          <button style={{ border: 'none', background: 'transparent', cursor: 'pointer', padding: '4px 10px', fontFamily: 'inherit' }}>
            <div style={{
              width: 48, height: 48, borderRadius: 999,
              background: C.point,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: '0 4px 14px rgba(0,161,155,0.45)',
            }}>
              <PlusIcon />
            </div>
          </button>
          {/* 커뮤니티 */}
          <button style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, border: 'none', background: 'transparent', cursor: 'pointer', padding: '4px 10px', fontFamily: 'inherit' }}>
            <GridIcon />
            <span style={{ fontSize: 10, color: C.gray }}>커뮤니티</span>
          </button>
          {/* 마이페이지 */}
          <button style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, border: 'none', background: 'transparent', cursor: 'pointer', padding: '4px 10px', fontFamily: 'inherit' }}>
            <UserIcon />
            <span style={{ fontSize: 10, color: C.gray }}>마이페이지</span>
          </button>
        </nav>
      )
    }

    // ─── App
    function App() {
      const [filter, setFilter] = useState(() => {
        const params = new URLSearchParams(window.location.search)
        return params.get('filter') || 'all'
      })

      const handleFilter = (next) => {
        setFilter(next)
        const url = new URL(window.location.href)
        url.searchParams.set('filter', next)
        window.history.pushState({}, '', url)
      }

      const filteredLatest = LATEST_ITEMS.filter(item => {
        if (filter === 'share') return item.type === 'share'
        if (filter === 'sell')  return item.type === 'sell'
        return true
      })

      const showShare = filter !== 'sell'

      return (
        <div style={{
          maxWidth: 390,
          margin: '0 auto',
          minHeight: '100dvh',
          background: C.bg,
          fontFamily: "'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
          position: 'relative',
        }}>
          {/* 스티키 헤더 */}
          <header style={{
            position: 'sticky', top: 0,
            background: C.bg, zIndex: 50,
            padding: '16px 16px 12px',
            display: 'flex', flexDirection: 'column', gap: 12,
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <span style={{ fontSize: 20, fontWeight: 800, color: C.text, letterSpacing: '-0.03em' }}>
                실마리<span style={{ color: C.point }}>.</span>
              </span>
              <div style={{
                width: 36, height: 36, borderRadius: 999,
                background: C.white,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 1px 4px rgba(0,0,0,0.08)',
                cursor: 'pointer',
              }}>
                <BellIcon />
              </div>
            </div>
            <SearchBar />
            <FilterTabs filter={filter} onChange={handleFilter} />
          </header>

          {/* 콘텐츠 */}
          <main style={{ display: 'flex', flexDirection: 'column', gap: 28, paddingTop: 8, paddingBottom: 110 }}>
            {showShare && <ShareSection items={SHARE_ITEMS} />}
            <LatestSection items={filteredLatest} />
            <FAQSection items={FAQ_ITEMS} />
          </main>

          <BottomNav />
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />)
  </script>
</body>
</html>
